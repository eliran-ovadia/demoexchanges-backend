name: Deploy to ECS

on:
  workflow_dispatch: :
#    branches: [master]

env:
  AWS_REGION: il-central-1          # ← update if your RDS is in a different region
  ECR_REPOSITORY: demo-stock-trading
  ECS_CLUSTER: demo-trading-cluster
  ECS_SERVICE: demo-trading-task-strong-service-111
  CONTAINER_NAME: demo-trading-app

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-minimum-32-characters!!
          ALGORITHM: HS256
          APP_ENV: dev
          REDIS_DEV_URL: redis://localhost:6379
          DATABASE_DEV_URL: postgresql://placeholder/placeholder
          FMP_API_KEY: test-key
        run: pytest tests/ --no-cov -q

  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    needs: test          # only deploy if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION
